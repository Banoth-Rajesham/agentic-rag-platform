<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Agent DNA | Register</title>

    <link rel="stylesheet" href="css/register.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://kit.fontawesome.com/6b0f0b0c4b.js" crossorigin="anonymous"></script>

</head>

<body>

<div class="background">

    <span class="blob blob1"></span>

    <span class="blob blob2"></span>

    <span class="blob blob3"></span>

</div>

<div class="wrapper">

<div class="left">

<div class="logo">

AGENT DNA

</div>

<h1>

Build the Future with AI

</h1>

<p>

Create intelligent AI agents with memory, automation, retrieval,
LLMs and production-grade workflows.

</p>

<div class="features">

<div class="feature">

<i class="fa-solid fa-brain"></i>

<span>Long Term Memory</span>

</div>

<div class="feature">

<i class="fa-solid fa-bolt"></i>

<span>Automation Ready</span>

</div>

<div class="feature">

<i class="fa-solid fa-robot"></i>

<span>Multi Agent System</span>

</div>

<div class="feature">

<i class="fa-solid fa-database"></i>

<span>Vector Database</span>

</div>

</div>

</div>

<div class="card">

<div class="top">

<h2>

Create Account

</h2>

<p>

Start building your AI workspace.

</p>

</div>

<form id="registerForm" autocomplete="off">
    <input type="text" name="fakeusernameremembered" autocomplete="username" style="display:none">
    <input type="password" name="fakepasswordremembered" autocomplete="new-password" style="display:none">

<div class="input-group">

<i class="fa-solid fa-user"></i>

<input
id="name"
type="text"
placeholder="Full Name"
autocomplete="name"
required
>

</div>

<div class="input-group">

<i class="fa-solid fa-envelope"></i>

<input
id="email"
type="email"
placeholder="Email Address"
autocomplete="email"
required
>

</div>

<div class="input-group">

<i class="fa-solid fa-lock"></i>

<input
id="password"
type="password"
placeholder="Password"
autocomplete="new-password"
required
>

<button
type="button"
id="togglePassword"
class="eye">

<i class="fa-solid fa-eye"></i>

</button>

</div>

<button
type="submit"
id="registerBtn">

Create Account

</button>

<div id="message"></div>

<div class="divider">

<span>OR</span>

</div>

<div class="social">

<button
type="button">

Google

</button>

<button
type="button">

GitHub

</button>

</div>

<div class="bottom">

Already have an account?

<a href="login.html">

Login

</a>

</div>

</form>

</div>

</div>

<script src="js/api.js"></script>
<script src="js/register.js"></script>

</body>

</html>
