<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent DNA | Login</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>
    <div class="background">
        <span class="blob blob1"></span>
        <span class="blob blob2"></span>
        <span class="blob blob3"></span>
    </div>

    <div class="wrapper">
        <div class="left">
            <div class="logo">AGENT DNA</div>
            <h1>Welcome Back</h1>
            <p>Login to access your AI workspace, agents, retrieval tools, and memory flows.</p>

            <div class="features">
                <div class="feature">
                    <i class="fa-solid fa-robot"></i>
                    <span>Multi Agent System</span>
                </div>
                <div class="feature">
                    <i class="fa-solid fa-brain"></i>
                    <span>Smart Memory</span>
                </div>
                <div class="feature">
                    <i class="fa-solid fa-bolt"></i>
                    <span>Automation Ready</span>
                </div>
                <div class="feature">
                    <i class="fa-solid fa-database"></i>
                    <span>Vector Database</span>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="top">
                <h2>Sign In</h2>
                <p>Enter your credentials to continue to the dashboard.</p>
            </div>
            <form id="loginForm" autocomplete="off">
                <input type="text" name="fakeusernameremembered" autocomplete="username" style="display:none">
                <input type="password" name="fakepasswordremembered" autocomplete="current-password" style="display:none">
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input id="email" type="email" placeholder="Email Address" autocomplete="email" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input id="password" type="password" placeholder="Password" autocomplete="current-password" required>
                    <button type="button" id="togglePassword" class="eye"><i class="fa-solid fa-eye"></i></button>
                </div>
                <button type="submit" id="loginBtn">Login</button>
                <div id="message"></div>
                <div class="divider"><span>OR</span></div>
                <div class="social">
                    <button type="button">Google</button>
                    <button type="button">GitHub</button>
                </div>
                <div class="bottom">Don't have an account? <a href="register.html">Register</a></div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
